<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tüm Ürünler - Gönül Ev Yemekleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --dark: #1a1a2e;
            --darker: #16213e;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.1);
            --success: #00d9ff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }

        .back-btn {
            background: var(--glass);
            border: none;
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--primary);
        }

        .logo {
            text-align: center;
        }

        .logo h1 {
            font-size: 1.3rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: block;
        }

        .cart-btn {
            background: var(--glass);
            border: none;
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s;
        }

        .cart-btn:hover {
            background: var(--primary);
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: var(--dark);
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Main Content */
        main {
            margin-top: 80px;
            padding: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h2 {
            font-size: 1.8rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .page-title p {
            color: var(--text-muted);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-btn {
            background: var(--glass);
            border: 2px solid transparent;
            color: var(--text);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-color: var(--primary);
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--glass);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent);
            color: var(--dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .product-info {
            padding: 25px;
        }

        .product-category {
            color: var(--primary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .product-info h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .product-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
        }

        .add-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .add-btn.added {
            background: #00b894;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Footer */
        footer {
            background: rgba(0,0,0,0.4);
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        .contact-item i {
            color: var(--primary);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(45deg, #00b894, #00d9ff);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            font-weight: 600;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        
        <div class="logo">
            <h1>GÖNÜL</h1>
            <span>EV YEMEKLERİ</span>
        </div>
        
        <a href="javascript:void(0)" class="cart-btn" onclick="goToCart()">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cartCount">0</span>
        </a>
    </header>

    <!-- Main Content -->
    <main>
        <div class="page-title">
            <h2>Tüm Ürünlerimiz</h2>
            <p>Hatay'ın eşsiz lezzetlerini keşfedin</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('all')">Tümü</button>
            <button class="filter-btn" onclick="filterProducts('hatay')">Hatay Mutfağı</button>
            <button class="filter-btn" onclick="filterProducts('corba')">Çorbalar</button>
            <button class="filter-btn" onclick="filterProducts('anayemek')">Ana Yemekler</button>
            <button class="filter-btn" onclick="filterProducts('dolma')">Dolma & Sarma</button>
            <button class="filter-btn" onclick="filterProducts('tatli')">Tatlılar</button>
            <button class="filter-btn" onclick="filterProducts('icecek')">İçecekler</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here -->
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-search"></i>
            <h3>Ürün bulunamadı</h3>
            <p>Bu kategoride henüz ürün eklenmemiş.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="contact-info">
            <div class="contact-item">
                <i class="fas fa-phone"></i>
                <span>0552 838 77 40</span>
            </div>
            <div class="contact-item">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp Sipariş</span>
            </div>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            © 2024 Gönül Ev Yemekleri
        </p>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span>Sepete eklendi!</span>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('products')) || [
            { id: 1, name: "İçli Köfte", category: "hatay", price: 60, description: "Hatay usulü bol bol cevizli içli köfte. El yapımı, günlük taze. 1 adet.", emoji: "🥟" },
            { id: 2, name: "Kısır", category: "hatay", price: 45, description: "Antakya usulü nar ekşili, bol yeşillikli kısır. 500 gr.", emoji: "🥗" },
            { id: 3, name: "Humus", category: "hatay", price: 50, description: "Tahinli, zeytinyağlı ev yapımı humus. 400 gr.", emoji: "🥙" },
            { id: 4, name: "Muhammara", category: "hatay", price: 55, description: "Cevizli, biberli Antakya muhammarası. 400 gr.", emoji: "🌶️" },
            { id: 5, name: "Mercimek Köftesi", category: "hatay", price: 40, description: "Ev yapımı mercimek köftesi. 500 gr.", emoji: "🧆" },
            { id: 6, name: "Yaprak Sarma", category: "dolma", price: 70, description: "Zeytinyağlı yaprak sarma. 1 kg.", emoji: "🍃" },
            { id: 7, name: "Biber Dolması", category: "dolma", price: 80, description: "Etli biber dolması. 6 adet.", emoji: "🫑" },
            { id: 8, name: "Kabak Tatlısı", category: "tatli", price: 65, description: "Tahinli, cevizli kabak tatlısı. 500 gr.", emoji: "🎃" },
            { id: 9, name: "Şöbiyet", category: "tatli", price: 25, description: "Ev yapımı şöbiyet. 1 adet.", emoji: "🥮" },
            { id: 10, name: "Ezogelin Çorbası", category: "corba", price: 35, description: "Ev yapımı ezogelin çorbası. 1 litre.", emoji: "🍲" },
            { id: 11, name: "Tarator", category: "hatay", price: 40, description: "Cevizli, yoğurtlu tarator. 400 gr.", emoji: "🥣" },
            { id: 12, name: "Haydari", category: "hatay", price: 35, description: "Sarımsaklı, naneli haydari. 300 gr.", emoji: "🧀" }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentFilter = 'all';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartCount();
        });

        function getCategoryName(cat) {
            const names = {
                'hatay': 'Hatay Mutfağı',
                'corba': 'Çorbalar',
                'anayemek': 'Ana Yemekler',
                'dolma': 'Dolma & Sarma',
                'tatli': 'Tatlılar',
                'icecek': 'İçecekler'
            };
            return names[cat] || cat;
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');
            
            const filtered = currentFilter === 'all' 
                ? products 
                : products.filter(p => p.category === currentFilter);
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            grid.innerHTML = filtered.map((product, index) => `
                <div class="product-card" style="animation-delay: ${index * 0.1}s">
                    <div class="product-image">
                        <span class="product-badge">${getCategoryName(product.category)}</span>
                        ${product.emoji}
                    </div>
                    <div class="product-info">
                        <div class="product-category">${getCategoryName(product.category)}</div>
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <div class="product-footer">
                            <span class="price">${product.price} ₺</span>
                            <button class="add-btn" onclick="addToCart(${product.id}, this)">
                                <i class="fas fa-plus"></i> Sepete Ekle
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterProducts(category) {
            currentFilter = category;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(getCategoryName(category)) || (category === 'all' && btn.textContent === 'Tümü')) {
                    btn.classList.add('active');
                }
            });
            
            renderProducts();
        }

        function addToCart(productId, btn) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            
            // Button animation
            btn.innerHTML = '<i class="fas fa-check"></i> Eklendi';
            btn.classList.add('added');
            
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-plus"></i> Sepete Ekle';
                btn.classList.remove('added');
            }, 2000);
            
            showToast();
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function goToCart() {
            window.location.href = 'index.html#cart';
        }

        // Listen for product updates
        window.addEventListener('storage', (e) => {
            if (e.key === 'products') {
                products = JSON.parse(e.newValue);
                renderProducts();
            }
        });
    </script>
</body>
</html>
