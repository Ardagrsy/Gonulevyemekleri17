<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli - Gönül Ev Yemekleri</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --dark: #1a1a2e;
            --darker: #16213e;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.1);
            --success: #00d9ff;
            --danger: #ff4757;
            --warning: #ffd700;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .login-box {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .login-box h2 {
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            color: var(--danger);
            margin-top: 15px;
            display: none;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
        }

        header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: var(--danger);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .section {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-add {
            background: linear-gradient(45deg, var(--success), #00b894);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn-save {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            width: 100%;
            font-weight: 600;
        }

        .products-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-item {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            display: grid;
            grid-template-columns: 60px 1fr auto auto;
            gap: 15px;
            align-items: center;
        }

        .product-emoji {
            width: 60px;
            height: 60px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .product-info h4 {
            margin-bottom: 5px;
        }

        .product-info p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .product-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--success);
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.3s;
        }

        .btn-edit {
            background: var(--warning);
            color: var(--dark);
        }

        .btn-delete {
            background: var(--danger);
        }

        .btn-edit:hover, .btn-delete:hover {
            transform: scale(1.1);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--darker);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--glass);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h3 {
            font-size: 1.3rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .emoji-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .emoji-option {
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            border-radius: 10px;
            padding: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .emoji-option:hover,
        .emoji-option.selected {
            border-color: var(--primary);
            background: var(--glass);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #00b894, #00d9ff);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 4000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .product-item {
                grid-template-columns: 50px 1fr;
                gap: 10px;
            }
            
            .product-price,
            .product-actions {
                grid-column: 2;
                justify-self: start;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <i class="fas fa-lock" style="font-size: 3rem; margin-bottom: 20px; color: var(--primary);"></i>
            <h2>Yönetici Girişi</h2>
            <p>Gönül Ev Yemekleri Admin Paneli</p>
            
            <div class="input-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
            </div>
            
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="Şifrenizi girin">
            </div>
            
            <button class="btn" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Giriş Yap
            </button>
            
            <p class="error-message" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i> Kullanıcı adı veya şifre hatalı!
            </p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <header>
            <div class="header-title">
                <i class="fas fa-user-shield" style="font-size: 1.8rem; color: var(--primary);"></i>
                <div>
                    <h1>Yönetici Paneli</h1>
                    <small style="color: var(--text-muted);">Gönül Ev Yemekleri</small>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Çıkış Yap
            </button>
        </header>

        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-utensils"></i>
                    <h3 id="totalProducts">0</h3>
                    <p>Toplam Ürün</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-shopping-cart"></i>
                    <h3 id="totalOrders">0</h3>
                    <p>Bugünkü Sipariş</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-eye"></i>
                    <h3 id="totalViews">0</h3>
                    <p>Sayfa Görüntüleme</p>
                </div>
            </div>

            <!-- Products Section -->
            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-box-open"></i> Ürün Yönetimi</h2>
                    <button class="btn-add" onclick="openModal()">
                        <i class="fas fa-plus"></i> Yeni Ürün Ekle
                    </button>
                </div>
                
                <div class="products-list" id="productsList">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- Settings Section -->
            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-cog"></i> Site Ayarları</h2>
                </div>
                
                <div class="settings-grid">
                    <div class="form-group">
                        <label>Telefon Numarası</label>
                        <input type="tel" id="settingsPhone" value="0552 838 77 40">
                    </div>
                    <div class="form-group">
                        <label>E-posta Adresi</label>
                        <input type="email" id="settingsEmail" value="gonulevyemekleri17@gmail.com">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Numarası</label>
                        <input type="tel" id="settingsWhatsapp" value="+90 552 838 77 40">
                    </div>
                    <div class="form-group">
                        <label>Site Başlığı</label>
                        <input type="text" id="settingsTitle" value="Gönül Ev Yemekleri - Hatay Lezzetleri">
                    </div>
                </div>
                
                <button class="btn-save" onclick="saveSettings()">
                    <i class="fas fa-save"></i> Ayarları Kaydet
                </button>
            </div>

            <!-- Admin Credentials Section -->
            <div class="section">
                <div class="section-header">
                    <h2><i class="fas fa-key"></i> Yönetici Bilgileri</h2>
                </div>
                
                <div class="settings-grid">
                    <div class="form-group">
                        <label>Yeni Kullanıcı Adı</label>
                        <input type="text" id="newUsername" placeholder="Yeni kullanıcı adı">
                    </div>
                    <div class="form-group">
                        <label>Yeni Şifre</label>
                        <input type="password" id="newPassword" placeholder="Yeni şifre">
                    </div>
                </div>
                
                <button class="btn-save" onclick="updateCredentials()">
                    <i class="fas fa-user-edit"></i> Bilgileri Güncelle
                </button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Yeni Ürün Ekle</h3>
                <button class="close-modal" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="form-group">
                <label>Ürün Adı</label>
                <input type="text" id="productName" placeholder="Örn: İçli Köfte">
            </div>
            
            <div class="form-group">
                <label>Kategori</label>
                <select id="productCategory">
                    <option value="hatay">Hatay Mutfağı</option>
                    <option value="corba">Çorbalar</option>
                    <option value="anayemek">Ana Yemekler</option>
                    <option value="dolma">Dolma & Sarma</option>
                    <option value="tatli">Tatlılar</option>
                    <option value="icecek">İçecekler</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Fiyat (₺)</label>
                <input type="number" id="productPrice" placeholder="Örn: 60">
            </div>
            
            <div class="form-group">
                <label>Açıklama</label>
                <textarea id="productDescription" placeholder="Ürün açıklaması..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Emoji Seç</label>
                <div class="emoji-selector" id="emojiSelector">
                    <div class="emoji-option" onclick="selectEmoji('🥟')">🥟</div>
                    <div class="emoji-option" onclick="selectEmoji('🥗')">🥗</div>
                    <div class="emoji-option" onclick="selectEmoji('🥙')">🥙</div>
                    <div class="emoji-option" onclick="selectEmoji('🌶️')">🌶️</div>
                    <div class="emoji-option" onclick="selectEmoji('🧆')">🧆</div>
                    <div class="emoji-option" onclick="selectEmoji('🍃')">🍃</div>
                    <div class="emoji-option" onclick="selectEmoji('🫑')">🫑</div>
                    <div class="emoji-option" onclick="selectEmoji('🎃')">🎃</div>
                    <div class="emoji-option" onclick="selectEmoji('🥮')">🥮</div>
                    <div class="emoji-option" onclick="selectEmoji('🍲')">🍲</div>
                    <div class="emoji-option" onclick="selectEmoji('🥣')">🥣</div>
                    <div class="emoji-option" onclick="selectEmoji('🧀')">🧀</div>
                    <div class="emoji-option" onclick="selectEmoji('🍖')">🍖</div>
                    <div class="emoji-option" onclick="selectEmoji('🍰')">🍰</div>
                    <div class="emoji-option" onclick="selectEmoji('🥤')">🥤</div>
                    <div class="emoji-option" onclick="selectEmoji('🥘')">🥘</div>
                    <div class="emoji-option" onclick="selectEmoji('🍚')">🍚</div>
                    <div class="emoji-option" onclick="selectEmoji('🥩')">🥩</div>
                </div>
                <input type="hidden" id="selectedEmoji" value="🥟">
            </div>
            
            <button class="btn-save" onclick="saveProduct()">
                <i class="fas fa-save"></i> Kaydet
            </button>
        </div>
    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMsg">
        <i class="fas fa-check-circle"></i>
        <span id="successText">İşlem başarılı!</span>
    </div>

    <script>
        // Admin Credentials (Default)
        let adminUser = localStorage.getItem('adminUser') || 'ardagorsoyy';
        let adminPass = localStorage.getItem('adminPass') || '20032009fg';
        
        let products = JSON.parse(localStorage.getItem('products')) || [
            { id: 1, name: "İçli Köfte", category: "hatay", price: 60, description: "Hatay usulü bol bol cevizli içli köfte. El yapımı, günlük taze. 1 adet.", emoji: "🥟" },
            { id: 2, name: "Kısır", category: "hatay", price: 45, description: "Antakya usulü nar ekşili, bol yeşillikli kısır. 500 gr.", emoji: "🥗" },
            { id: 3, name: "Humus", category: "hatay", price: 50, description: "Tahinli, zeytinyağlı ev yapımı humus. 400 gr.", emoji: "🥙" },
            { id: 4, name: "Muhammara", category: "hatay", price: 55, description: "Cevizli, biberli Antakya muhammarası. 400 gr.", emoji: "🌶️" },
            { id: 5, name: "Mercimek Köftesi", category: "hatay", price: 40, description: "Ev yapımı mercimek köftesi. 500 gr.", emoji: "🧆" },
            { id: 6, name: "Yaprak Sarma", category: "dolma", price: 70, description: "Zeytinyağlı yaprak sarma. 1 kg.", emoji: "🍃" }
        ];

        let editingId = null;

        // Check if already logged in
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            showPanel();
        }

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === adminUser && password === adminPass) {
                localStorage.setItem('adminLoggedIn', 'true');
                showPanel();
                showSuccess('Giriş başarılı! Hoş geldiniz.');
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMsg').style.display = 'none';
                }, 3000);
            }
        }

        function showPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadProducts();
            updateStats();
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function loadProducts() {
            const container = document.getElementById('productsList');
            
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">Henüz ürün eklenmemiş.</p>';
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-item">
                    <div class="product-emoji">${product.emoji}</div>
                    <div class="product-info">
                        <h4>${product.name}</h4>
                        <p>${getCategoryName(product.category)} • ${product.description.substring(0, 50)}...</p>
                    </div>
                    <div class="product-price">${product.price} ₺</div>
                    <div class="product-actions">
                        <button class="btn-edit" onclick="editProduct(${product.id})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-delete" onclick="deleteProduct(${product.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('totalProducts').textContent = products.length;
        }

        function getCategoryName(cat) {
            const names = {
                'hatay': 'Hatay Mutfağı',
                'corba': 'Çorbalar',
                'anayemek': 'Ana Yemekler',
                'dolma': 'Dolma & Sarma',
                'tatli': 'Tatlılar',
                'icecek': 'İçecekler'
            };
            return names[cat] || cat;
        }

        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            // Simulate other stats
            document.getElementById('totalOrders').textContent = Math.floor(Math.random() * 20);
            document.getElementById('totalViews').textContent = Math.floor(Math.random() * 500) + 100;
        }

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Yeni Ürün Ekle';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('selectedEmoji').value = '🥟';
            document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function selectEmoji(emoji) {
            document.getElementById('selectedEmoji').value = emoji;
            document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function saveProduct() {
            const name = document.getElementById('productName').value;
            const category = document.getElementById('productCategory').value;
            const price = parseFloat(document.getElementById('productPrice').value);
            const description = document.getElementById('productDescription').value;
            const emoji = document.getElementById('selectedEmoji').value;
            
            if (!name || !price || !description) {
                alert('Lütfen tüm alanları doldurun!');
                return;
            }
            
            if (editingId) {
                const index = products.findIndex(p => p.id === editingId);
                if (index !== -1) {
                    products[index] = { ...products[index], name, category, price, description, emoji };
                }
                showSuccess('Ürün güncellendi!');
            } else {
                const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
                products.push({ id: newId, name, category, price, description, emoji });
                showSuccess('Yeni ürün eklendi!');
            }
            
            localStorage.setItem('products', JSON.stringify(products));
            closeModal();
            loadProducts();
            
            // Notify other pages
            window.dispatchEvent(new StorageEvent('storage', { key: 'products', newValue: JSON.stringify(products) }));
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            
            editingId = id;
            document.getElementById('modalTitle').textContent = 'Ürün Düzenle';
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('selectedEmoji').value = product.emoji;
            
            document.querySelectorAll('.emoji-option').forEach(e => {
                e.classList.toggle('selected', e.textContent === product.emoji);
            });
            
            document.getElementById('productModal').classList.add('active');
        }

        function deleteProduct(id) {
            if (!confirm('Bu ürünü silmek istediğinize emin misiniz?')) return;
            
            products = products.filter(p => p.id !== id);
            localStorage.setItem('products', JSON.stringify(products));
            loadProducts();
            showSuccess('Ürün silindi!');
        }

        function saveSettings() {
            showSuccess('Ayarlar kaydedildi!');
        }

        function updateCredentials() {
            const newUser = document.getElementById('newUsername').value;
            const newPass = document.getElementById('newPassword').value;
            
            if (newUser) {
                adminUser = newUser;
                localStorage.setItem('adminUser', newUser);
            }
            if (newPass) {
                adminPass = newPass;
                localStorage.setItem('adminPass', newPass);
            }
            
            document.getElementById('newUsername').value = '';
            document.getElementById('newPassword').value = '';
            
            showSuccess('Yönetici bilgileri güncellendi!');
        }

        function showSuccess(text) {
            const msg = document.getElementById('successMsg');
            document.getElementById('successText').textContent = text;
            msg.style.display = 'flex';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        // Enter key login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
                login();
            }
        });
    </script>
</body>
</html>
